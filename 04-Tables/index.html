<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>

<body>
    <h1>Tables</h1>

    <table>
        <caption>Trainers</caption>
        <thead>
            <th>Name</th>
            <th>Age</th>
            <th>Specialism</th>
        </thead>
        <tbody>
            <tr>
                <td>JH</td>
                <td>32</td>
                <td>Java</td>
            </tr>
            <tr>
                <td>CG</td>
                <td>33</td>
                <td>Web</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
