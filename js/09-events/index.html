<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
        body.dark {
            background-color: black;
            color: white;
        }


        div#output>p:hover {
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
    <script>
        function handleClick() {
            alert("Button was clicked!");
        }


        function toggleTheme(event) {
            const buttonClicked = event.target;
            if (buttonClicked.innerText === "Dark Mode") {
                document.body.className = "dark";
                buttonClicked.innerText = "Light Mode";
            } else {
                document.body.className = "";
                buttonClicked.innerText = "Dark Mode";
            }
        }


    </script>
</head>

<body>
    <h1>Events</h1>
    <section>
        <h2>Buttons</h2>
        <button onclick="alert('yo!')">Click Me</button>
        <button onclick="handleClick()">Click Me Too!</button>
        <button onclick="toggleTheme(event)">Dark Mode</button>
    </section>
    <section>
        <h2>Input</h2>
        <label for="miles">Miles:</label>
        <input type="number" id="miles" name="miles" value="0">
        <label for="kilometres">Kilometres:</label>
        <input type="number" id="kilometres" name="kilometres" value="0">
    </section>
    <section>
        <h2>Counter</h2>
        <input type="number" id="counter" value="0" readonly>
        <button id="increment">+</button>
    </section>
    <section>
        <h2>AJAX</h2>
        <div id="output">

        </div>
    </section>
    <script>
        document.getElementById("increment").addEventListener("click", function () {
            const counterInput = document.getElementById("counter");
            counterInput.value = parseInt(counterInput.value) + 1;
        });


        const trainers = [
            { name: "JH", specialty: "Java", age: 32, homePage: "https://github.com/JHarry444" },
            { name: "CG", specialty: "Web", age: 33 },
            { name: "MS", specialty: "Oracle", age: 45 }
        ];

        trainers.forEach(trainer => {
            const trainerPara = document.createElement("p");
            trainerPara.textContent = `Hello! My name is ${trainer.name} and I am a ${trainer.age} years old trainer that specialises in ${trainer.specialty}`;
            trainerPara.addEventListener("click", () => {
                window.open(trainer.homePage, "_blank");
            });
            document.getElementById("output").appendChild(trainerPara);
        })

        document.getElementById("miles").addEventListener("input", function (e) {
            const miles = e.target.value;
            const kilometres = miles * 1.6;
            document.getElementById("kilometres").value = kilometres;
        });

        document.getElementById("kilometres").addEventListener("input", function (e) {
            const kilometres = e.target.value;
            const miles = kilometres / 1.6;
            document.getElementById("miles").value = miles;
        });

    </script>
</body>

</html>
