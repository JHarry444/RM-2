<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro</title>
    <script>
        let myVar = 12;
        console.log("typeof myVar:", typeof myVar);
        myVar = 'JH';
        console.log("typeof myVar:", typeof myVar);
        myVar = true;
        console.log("typeof myVar:", typeof myVar);
        myVar = {};
        console.log("typeof myVar:", typeof myVar);
        myVar = [];
        console.log("typeof myVar:", typeof myVar);
        myVar = null;
        console.log("typeof myVar:", typeof myVar);
        myVar = undefined;
        console.log("typeof myVar:", typeof myVar);


        let myName = "Jordan Harrison";
        console.log("Index of J:", myName.indexOf('J'));
        console.log("Index of n:", myName.indexOf('n'));
        console.log("Last index of n:", myName.lastIndexOf('n'));

        console.log("Lower:", myName.toLowerCase());

        console.log("Name:", myName);

        console.log("Substring:", myName.substring(7));

        myName = myName.toLowerCase();

        console.log("Name:", myName);

    </script>
</head>

<body>
    <h1>Intro</h1>

</body>

</html>
